<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Space Invaders DOM</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel" aria-label="Jeu Space Invaders">
        <header class="topbar">
          <div class="brand">
            <p class="eyebrow">DOM Arcade</p>
            <h1>Space Invaders</h1>
            <p class="brand-subtitle">Mode histoire, trois cartes et classement pilote.</p>
          </div>
          <div class="live-stats" aria-label="Statistiques du jeu">
            <div class="stat-card">
              <span class="label">Temps</span>
              <strong id="hud-timer">02:00</strong>
            </div>
            <div class="stat-card">
              <span class="label">Score</span>
              <strong id="hud-score">0</strong>
            </div>
            <div class="stat-card">
              <span class="label">Vies</span>
              <strong id="hud-lives">3</strong>
            </div>
            <div class="stat-card debug">
              <span class="label">FPS</span>
              <strong id="hud-fps">60</strong>
            </div>
          </div>
        </header>

        <section class="game-frame">
          <div
            id="game-scene"
            class="game-scene"
            role="application"
            aria-label="Zone de jeu"
          >
            <div id="game-world" class="game-world">
              <div id="tile-layer" class="tile-layer"></div>
              <div class="stars"></div>
              <div id="entity-layer" class="entity-layer"></div>
            </div>

            <aside id="overlay" class="overlay" aria-live="polite">
              <div class="overlay-card">
                <p id="overlay-tag" class="overlay-tag">Mode histoire</p>
                <h2 id="overlay-title">Briefing orbital</h2>
                <p id="overlay-text" class="overlay-text"></p>

                <section id="map-panel" class="map-panel" hidden>
                  <p class="panel-title">Choisir une carte</p>
                  <div id="map-options" class="map-options"></div>
                </section>

                <div id="resume-panel" class="overlay-scoreboard" aria-label="Resume de partie">
                  <div>
                    <span>Temps</span>
                    <strong id="menu-timer">02:00</strong>
                  </div>
                  <div>
                    <span>Score</span>
                    <strong id="menu-score">0</strong>
                  </div>
                  <div>
                    <span>Vies</span>
                    <strong id="menu-lives">3</strong>
                  </div>
                  <div>
                    <span>FPS</span>
                    <strong id="menu-fps">60</strong>
                  </div>
                </div>

                <form id="score-form" class="score-form" hidden>
                  <label class="panel-title" for="player-name">Nom du pilote</label>
                  <div class="score-fields">
                    <input
                      id="player-name"
                      name="player-name"
                      type="text"
                      maxlength="18"
                      autocomplete="nickname"
                      placeholder="Capitaine Nova"
                      required
                    />
                    <button id="submit-score-button" type="submit">Envoyer</button>
                  </div>
                  <p id="score-form-message" class="score-form-message"></p>
                </form>

                <section id="ranking-panel" class="ranking-panel" hidden>
                  <p id="ranking-feedback" class="ranking-feedback"></p>

                  <div class="ranking-table" role="table" aria-label="Classement">
                    <div class="ranking-row ranking-head" role="row">
                      <span>Rang</span>
                      <span>Nom</span>
                      <span>Score</span>
                      <span>Temps</span>
                    </div>
                    <div id="ranking-rows" class="ranking-body"></div>
                  </div>

                  <div class="ranking-pagination">
                    <button id="page-prev" type="button">Page precedente</button>
                    <strong id="page-indicator">Page 1/1</strong>
                    <button id="page-next" type="button">Page suivante</button>
                  </div>
                </section>

                <div class="overlay-actions">
                  <button id="start-button" type="button" hidden>Demarrer</button>
                  <button id="continue-button" type="button" hidden>Continuer</button>
                  <button id="restart-button" type="button" hidden>Recommencer</button>
                </div>
              </div>
            </aside>
          </div>
        </section>

        <footer class="controls">
          <span>Deplacer: fleches ou A/D</span>
          <span>Tirer: espace</span>
          <span>Pause: Echap ou P</span>
          <span>Relancer: R</span>
        </footer>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
